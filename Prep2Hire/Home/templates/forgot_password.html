<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forgot Password</title>

  <!-- Google Fonts: Montserrat -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet" />

  <!-- Firebase SDK (Compat Mode) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

  <style>
    body {
      margin: 0;
      background: #f9fafb;
      font-family: 'Montserrat', sans-serif;
      color: #1e40af;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }
    .container {
      background: #ffffff;
      padding: 3rem 3.5rem;
      border-radius: 14px;
      box-shadow: 0 4px 16px rgba(30, 64, 175, 0.15);
      width: 100%;
      max-width: 400px;
      text-align: center;
      border: 2px solid #1e40af;
    }
    h2 {
      font-weight: 700;
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      color: #1e40af;
      letter-spacing: 1px;
    }
    p.instruction {
      margin-bottom: 2rem;
      font-size: 0.95rem;
      color: #3b82f6;
      line-height: 1.5;
    }
    .input-group {
      text-align: left;
      margin-bottom: 1.5rem;
    }
    .input-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #1e40af;
    }
    input[type="email"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1.5px solid #1e40af;
      background: #e0e7ff;
      color: #1e40af;
      font-size: 1rem;
      box-sizing: border-box;
    }
    button {
      background: #1e40af;
      border: none;
      width: 100%;
      padding: 14px 0;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 15px rgba(30, 64, 175, 0.4);
    }
    button:hover {
      background: #2563eb;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.6);
    }
    .back-link {
      margin-top: 1.5rem;
      font-size: 0.9rem;
    }
    .back-link a {
      color: #1e40af;
      text-decoration: none;
      font-weight: 600;
    }
    .back-link a:hover {
      text-decoration: underline;
    }
    #message {
      margin-top: 1.5rem;
      padding: 10px;
      border-radius: 6px;
      display: none;
      font-size: 0.9rem;
    }
    .success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #166534;
    }
    .error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #991b1b;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Reset Password</h2>
    <p class="instruction">Enter your email address and we'll send you a link to reset your password via Firebase.</p>
    
    <div class="input-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="example@email.com" required>
    </div>

    <button id="resetBtn">Send Reset Link</button>

    <div id="message"></div>

    <p class="back-link">
      <a href="{% url 'login' %}">← Back to Login</a>
    </p>
  </div>

  <script>
    // Firebase configuration from your google-services.json
    const firebaseConfig = {
      apiKey: "AIzaSyDCYihoE0th0iNYPb0IZDVqbWp3y9EcTWg",
      authDomain: "prep2hire-30ebc.firebaseapp.com",
      projectId: "prep2hire-30ebc",
      storageBucket: "prep2hire-30ebc.firebasestorage.app",
      messagingSenderId: "438960519163",
      appId: "1:438960519163:web:cd878a56c1a5257aed3d5e" // Note: Replaced 'android' with 'web' as a likely fallback, verify in Firebase console if needed
    };


    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const emailInput = document.getElementById('email');
    const resetBtn = document.getElementById('resetBtn');
    const messageDiv = document.getElementById('message');

    resetBtn.addEventListener('click', () => {
      const email = emailInput.value;
      if (!email) {
        showMessage('Please enter your email.', 'error');
        return;
      }

      resetBtn.disabled = true;
      resetBtn.innerText = 'Sending...';

      auth.sendPasswordResetEmail(email)
        .then(() => {
          showMessage('Password reset email sent! Check your inbox.', 'success');
          resetBtn.innerText = 'Email Sent';
        })
        .catch((error) => {
          console.error(error);
          showMessage(error.message, 'error');
          resetBtn.disabled = false;
          resetBtn.innerText = 'Send Reset Link';
        });
    });

    function showMessage(text, type) {
      messageDiv.innerText = text;
      messageDiv.className = type;
      messageDiv.style.display = 'block';
    }
  </script>
</body>
</html>
