<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Your Email</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #f9fafb; color: #1e40af; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #fff; padding: 3rem; border-radius: 14px; box-shadow: 0 4px 16px rgba(30,64,175,0.15); text-align: center; max-width: 500px; border: 2px solid #1e40af; }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        p { font-size: 1.1rem; line-height: 1.6; color: #3b82f6; }
        .email { font-weight: 700; color: #1e40af; }
        .back { margin-top: 2rem; display: block; text-decoration: none; color: #1e40af; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Confirm your email!</h1>
        <p>A verification link has been sent to <span class="email">{{ email }}</span>.</p>
        <p>Please check your inbox (and spam folder) and click the link to activate your account.</p>
        <a href="{% url 'login' %}" class="back">← Back to Login</a>
    </div>
</body>
</html>
