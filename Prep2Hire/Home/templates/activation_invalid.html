<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invalid Activation Link</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #f9fafb; color: #991b1b; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #fff; padding: 3rem; border-radius: 14px; box-shadow: 0 4px 16px rgba(153,27,27,0.15); text-align: center; max-width: 500px; border: 2px solid #991b1b; }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        p { font-size: 1.1rem; line-height: 1.6; color: #b91c1c; }
        .back { margin-top: 2rem; display: block; text-decoration: none; color: #991b1b; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Invalid Link</h1>
        <p>The activation link is invalid or has expired. Please try signing up again or contact support.</p>
        <a href="{% url 'signup' %}" class="back">← Back to Signup</a>
    </div>
</body>
</html>
