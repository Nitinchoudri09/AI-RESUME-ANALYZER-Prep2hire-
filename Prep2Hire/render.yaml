services:
  - type: web
    name: prep2hire
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn Prep2Hire.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DJANGO_SETTINGS_MODULE
        value: Prep2Hire.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
