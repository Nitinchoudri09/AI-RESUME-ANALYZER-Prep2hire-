services:
  - type: web
    name: prep2hire
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn --chdir Prep2Hire Prep2Hire.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DJANGO_SETTINGS_MODULE
        value: Prep2Hire.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "ai-resume-analyzer-prep2hire-3.onrender.com,localhost,127.0.0.1"
